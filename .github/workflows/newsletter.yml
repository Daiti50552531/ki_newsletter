name: Täglicher KI-Newsletter

on:
  schedule:
    - cron: '44 2 * * *'   # Hauptlauf 02:44 UTC (krumme Minute = weniger GitHub-Verzögerung)
    - cron: '44 5 * * *'   # Backup-Lauf 05:44 UTC – beendet sich sofort, wenn heute schon versendet
  workflow_dispatch:       # Manueller Test-Run jederzeit möglich

permissions:
  contents: write   # History-Datei committen/pushen
  issues: write     # Fehler-Issue als zweiter Meldekanal

# Nie zwei Läufe gleichzeitig (verzögerter Haupt-Cron + Backup-Cron können kollidieren)
concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Newsletter versenden
        env:
          PYTHONUNBUFFERED: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python newsletter.py

      - name: Bei Fehlschlag GitHub-Issue anlegen (Zweitkanal falls Gmail selbst betroffen)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 Newsletter-Lauf fehlgeschlagen ($(date -u '+%d.%m.%Y %H:%M') UTC)" \
            --body "Der Newsletter-Lauf ist fehlgeschlagen. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "Issue konnte nicht angelegt werden"
